substitutions:
  _REGION: us-east1
  _REPO: revenue-intelligence
  _SERVICE_NAME: revenue-intelligence-server
  _NVIDIA_API_KEY_SECRET: nvidia-api-key
  _SUPABASE_URL_SECRET: supabase-url
  _SUPABASE_SERVICE_KEY_SECRET: supabase-service-key

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: server
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-secrets=NVIDIA_API_KEY=${_NVIDIA_API_KEY_SECRET}:latest,SUPABASE_URL=${_SUPABASE_URL_SECRET}:latest,SUPABASE_SERVICE_KEY=${_SUPABASE_SERVICE_KEY_SECRET}:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
